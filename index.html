<!DOCTYPE html>
<html>
<head>
  <title>Recipe Finder</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🍽 Recipe Finder</h1>
<p class="subtitle">Explore delicious vegetarian & sweet recipes 🍰🥗🥤</p>

<!-- Search -->
<div class="search-box">
  <input type="text" id="searchBox" placeholder="Search recipes...">
  <button onclick="searchMeals()">Search</button>
</div>

<!-- Control Bar -->
<div class="control-bar">
  <div class="control-item">
    <label>Filter:</label>
    <select id="filterCategory" onchange="applyFilters()"></select>
  </div>

  <div class="control-item">
    <label>Sort:</label>
    <select id="sortOption" onchange="applyFilters()">
      <option value="default">None</option>
      <option value="asc">A-Z</option>
      <option value="desc">Z-A</option>
    </select>
  </div>
</div>

<p id="loading" style="display:none;">Loading...</p>

<div id="recipes"></div>

<script src="script.js"></script>
</body>
</html>
